<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certifications | Chithma Pathirana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%2322d3ee'/%3E%3Ctext x='50' y='57' font-size='42' text-anchor='middle' fill='%230f172a' font-family='Fira Code,monospace'%3ECP%3C/text%3E%3C/svg%3E"
        sizes="any">
    <meta name="theme-color" content="#22d3ee">
</head>

<body>
    <div class="background-grid"></div>
    <div class="cursor-dot" id="cursor-dot"></div>

    <nav class="navbar">
        <div class="logo">&lt;CP /&gt;</div>
        <ul class="nav-links">
            <li><a href="index.html#hero">Home</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#skills">Skills</a></li>
            <li><a href="index.html#experience">Experience</a></li>
            <li><a href="certifications.html">Certifications</a></li>
            <li><a href="index.html#ctf">CTF Competitions</a></li>
            <li><a href="index.html#projects">Projects</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
        <button id="theme-toggle" class="theme-toggle" type="button">Light Mode</button>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <main>
        <section class="section">
            <h2 class="section-title"><span class="num">01.</span> LinkedIn Certificates</h2>
            <div class="certificate-card">
                <div class="cert-card-heading">
                    <i data-lucide="linkedin" class="card-icon"></i>
                </div>
                <div class="viewer-thumbs linkedin-grid">
                    <button type="button" class="cert-thumb linkedin-thumb" data-hover="images/FootprintingandReconnaissance.png" data-src="images/HCCS.png" data-alt="Foundations of Cybersecurity">
                        <img src="images/LINKEDIN_LOGO.png" alt="LinkedIn certificate logo" onerror="this.style.display='none'">
                        <span class="cert-name">Ethical Hacking: Footprinting and Reconnaissance</span>
                    </button>
                    <button type="button" class="cert-thumb linkedin-thumb" data-hover="images/AwarenessRansomware.png" data-src="images/HCCS.png" data-alt="Network Security Fundamentals">
                        <img src="images/LINKEDIN_LOGO.png" alt="LinkedIn certificate logo" onerror="this.style.display='none'">
                        <span class="cert-name">Cybersecurity Awareness: Ransomware</span>
                    </button>
                    <button type="button" class="cert-thumb linkedin-thumb" data-hover="images/FootprintingandReconnaissance.png" data-src="images/HCCS.png" data-alt="Introduction to Ethical Hacking">
                        <img src="images/LINKEDIN_LOGO.png" alt="LinkedIn certificate logo" onerror="this.style.display='none'">
                        <span class="cert-name">Introduction to Ethical Hacking</span>
                    </button>
                    <button type="button" class="cert-thumb linkedin-thumb" data-hover="images/FootprintingandReconnaissance.png" data-src="images/HCCS.png" data-alt="Cybersecurity Essentials">
                        <img src="images/LINKEDIN_LOGO.png" alt="LinkedIn certificate logo" onerror="this.style.display='none'">
                        <span class="cert-name">Cybersecurity Essentials</span>
                    </button>
                    <button type="button" class="cert-thumb linkedin-thumb" data-hover="images/FootprintingandReconnaissance.png" data-src="images/HCCS.png" data-alt="Web Application Security">
                        <img src="images/LINKEDIN_LOGO.png" alt="LinkedIn certificate logo" onerror="this.style.display='none'">
                        <span class="cert-name">Web Application Security</span>
                    </button>
                    <button type="button" class="cert-thumb linkedin-thumb" data-hover="images/FootprintingandReconnaissance.png" data-src="images/HCCS.png" data-alt="Security Awareness">
                        <img src="images/LINKEDIN_LOGO.png" alt="LinkedIn certificate logo" onerror="this.style.display='none'">
                        <span class="cert-name">Security Awareness</span>
                    </button>
                </div>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title"><span class="num">02.</span> Cybersecurity Certifications</h2>
            <div class="certificate-card">
                <div class="cert-card-heading">
                    <i data-lucide="award" class="card-icon"></i>
                </div>
                <div class="viewer-thumbs">
                    <button type="button" class="cert-thumb" data-hover="images/FootprintingandReconnaissance.png" data-src="images/HCCS.png" data-alt="Human Centric Cybersecurity – Macquarie University">
                        <img src="images/HCCS_logo.png" alt="Certificate logo" onerror="this.style.display='none'">
                    </button>
                    <button type="button" class="cert-thumb" data-hover="images/FootprintingandReconnaissance.png" data-src="images/HCCS.png" data-alt="ISC2 Certified in Cybersecurity (CC) - ONGOING">
                        <img src="images/ISC2_CC_logo.png" alt="Certificate logo" onerror="this.style.display='none'">
                    </button>
                </div>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title"><span class="num">03.</span> CTF Certifications</h2>
            <div class="certificate-card">
                <div class="cert-card-heading">
                    <i data-lucide="award" class="card-icon"></i>
                </div>
                <div class="viewer-thumbs">
                    <button type="button" class="cert-thumb" data-hover="images/FootprintingandReconnaissance.png" data-src="images/HCCS.png" data-alt="ZERO-DAY 2026 Certificate">
                        <img src="images/HCCS_logo.png" alt="Certificate logo" onerror="this.style.display='none'">
                    </button>
                    <button type="button" class="cert-thumb" data-hover="images/FootprintingandReconnaissance.png" data-src="images/HCCS.png" data-alt="Aftermath Apiit 2025 Certificate">
                        <img src="images/HCCS_logo.png" alt="Certificate logo" onerror="this.style.display='none'">
                    </button>
                    <button type="button" class="cert-thumb" data-hover="images/FootprintingandReconnaissance.png" data-src="images/HCCS.png" data-alt="Cyber Security Summit 2025 Certificate">
                        <img src="images/HCCS_logo.png" alt="Certificate logo" onerror="this.style.display='none'">
                    </button>
                    <button type="button" class="cert-thumb" data-hover="images/FootprintingandReconnaissance.png" data-src="images/HCCS.png" data-alt="Sleigh the Flag CTF 2025 Certificate">
                        <img src="images/HCCS_logo.png" alt="Certificate logo" onerror="this.style.display='none'">
                    </button>
                    <button type="button" class="cert-thumb" data-hover="images/FootprintingandReconnaissance.png" data-src="images/HCCS.png" data-alt="APIIT CTF Certificate">
                        <img src="images/HCCS_logo.png" alt="Certificate logo" onerror="this.style.display='none'">
                    </button>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="certificate-viewer">
                <div class="viewer-card">
                    <div class="viewer-header">
                        <div>
                            <h3>Preview</h3>
                            <p>Selected certificate appears here.</p>
                        </div>
                    </div>
                    <div class="viewer-frame">
                        <img id="active-certificate" src="images/HCCS.png" alt="Certificate preview" onerror="this.style.opacity='0'">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
